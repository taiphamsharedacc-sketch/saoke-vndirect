<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DPlus Demo</title>
  <style>
    :root {
      --bg: #17183a;
      --bg2: #23244a;
      --bg3: #1f2142;
      --card: #1f2043;
      --card2: #24264b;
      --line: #3d3f67;
      --text: #f5f5f7;
      --muted: #a5a7c5;
      --orange: #ff7600;
      --blue: #56a8ff;
      --green: #20d07a;
      --yellow: #ffd65b;
      --danger: #ff5d6e;
    }
    *{box-sizing:border-box}
    html,body,#app{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:"Segoe UI",Arial,sans-serif}
    body{min-height:100vh}
    #app{min-height:100vh;background:var(--bg)}
    a{color:var(--orange)}
    .header{height:78px;background:#2a2c50;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;padding:0 36px;gap:32px;position:sticky;top:0;z-index:50}
    .brand{display:flex;align-items:baseline;gap:4px;font-weight:800;font-size:28px;cursor:pointer}
    .brand .vnd{color:var(--orange)}
    .brand .go{color:#b8bacd}
    .nav{display:flex;gap:20px}
    .nav button{background:none;border:none;color:#b8bacd;font-size:17px;cursor:pointer;padding:8px 0}
    .nav button.active{color:#fff}
    .head-right{margin-left:auto;display:flex;align-items:center;gap:18px}
    .hotline{color:#b8bacd;font-size:16px}
    .hotline span{color:var(--orange);font-weight:700}
    .avatar{width:46px;height:46px;border-radius:50%;background:var(--orange);display:flex;align-items:center;justify-content:center;font-weight:700}
    .page{max-width:1100px;margin:0 auto;padding:26px 24px 48px}
    .landing{max-width:980px}
    h1,h2,h3,h4,p{margin:0}
    h1{font-size:48px;font-weight:800}
    h2{font-size:24px;font-weight:800}
    h3{font-size:18px;font-weight:700}
    .muted{color:var(--muted)}
    .orange{color:var(--orange)}
    .blue{color:var(--blue)}
    .green{color:var(--green)}
    .yellow{color:var(--yellow)}
    .card{background:var(--card);border:1px solid var(--line);border-radius:18px}
    .card.pad{padding:22px}
    .hero{text-align:center;margin:20px 0 30px}
    .hero p{max-width:700px;margin:10px auto 0;line-height:1.6;font-size:16px}
    .btn{border:none;border-radius:12px;padding:14px 26px;font-size:15px;font-weight:700;cursor:pointer;transition:.18s ease}
    .btn.primary{background:var(--orange);color:#fff}
    .btn.secondary{background:transparent;color:#c4c5d6;border:1px solid var(--line)}
    .btn.ghost{background:transparent;color:#c4c5d6;border:1px solid var(--line);padding:9px 14px;font-size:12px;border-radius:9px}
    .btn.block{width:100%}
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
    .grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .feature{padding:22px;text-align:center}
    .feature .icon{font-size:34px;margin-bottom:10px}
    .feature .title{font-size:15px;font-weight:700;margin-bottom:8px}
    .feature .desc{font-size:12px;color:var(--muted);line-height:1.55}
    .product{padding:28px;position:relative;background:linear-gradient(135deg,var(--card),var(--bg2))}
    .tag{position:absolute;top:16px;right:16px;border-radius:999px;padding:4px 10px;font-size:9px;font-weight:700}
    .product .desc{font-size:12px;line-height:1.65;color:var(--muted);margin:18px 0 16px;max-width:82%}
    .mini-box{background:var(--bg);padding:12px 14px;border-radius:10px}
    .mini-box .label{font-size:10px;color:var(--muted);margin-bottom:4px}
    .mini-box .value{font-size:14px;font-weight:700}
    .chart-card{padding:24px;margin-bottom:16px}
    .range-wrap{margin:14px 0 18px}
    input[type=range]{width:100%;accent-color:var(--orange)}
    .compare-table{overflow:hidden;margin-bottom:34px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 14px;font-size:12px}
    thead tr{background:#2a2c50}
    th{color:var(--muted);font-weight:600;text-align:left}
    tbody tr:nth-child(even){background:var(--card2)}
    tbody tr+tr{border-top:1px solid rgba(255,255,255,.04)}
    .faq-item{padding:16px 20px;margin-bottom:8px;cursor:pointer}
    .faq-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
    .faq-q{font-size:13px;font-weight:700;line-height:1.5}
    .faq-a{margin-top:12px;padding-top:12px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);line-height:1.75}
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
    .summary-card{padding:16px 18px}
    .summary-card .t{font-size:11px;color:var(--muted);margin-bottom:8px}
    .summary-card .v{font-size:20px;font-weight:800}
    .layout-main{display:grid;grid-template-columns:1fr 290px;gap:14px}
    .tabs{display:flex;gap:0}
    .tabs button{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 18px;font-size:11px;font-weight:700;cursor:pointer}
    .tabs button:first-child{border-radius:9px 0 0 9px}
    .tabs button:last-child{border-radius:0 9px 9px 0}
    .tabs button.active{background:var(--orange);border-color:var(--orange);color:#fff}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;background:rgba(32,208,122,.12);color:var(--green);font-size:10px;font-weight:700}
    .text-right{text-align:right}.text-center{text-align:center}
    .input,.select{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:#fff;font-size:14px}
    .label{font-size:11px;color:var(--muted);display:block;margin-bottom:6px}
    .helper{font-size:10px;color:var(--muted);line-height:1.7}
    .quick-row{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 12px}
    .chip{background:var(--bg);border:1px solid var(--line);color:#d2d3de;border-radius:999px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer}
    .term-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
    .term-btn{background:var(--bg);border:1px solid var(--line);color:#d2d3de;border-radius:10px;padding:8px 14px;font-size:11px;font-weight:700;cursor:pointer}
    .term-btn.active,.chip:hover{border-color:var(--orange);color:#fff}
    .term-btn.active{background:rgba(255,118,0,.12)}
    .section-title{font-size:12px;font-weight:700;margin-bottom:8px}
    .method-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .method-card{background:var(--bg);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:16px}
    .transfer-box{background:#151633;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-top:8px}
    .transfer-line{font-size:11px;line-height:1.6;margin-bottom:8px}
    .note-box{background:rgba(255,214,91,.06);border:1px solid rgba(255,214,91,.18);border-radius:12px;padding:12px;margin-top:14px}
    .funding-choices{display:grid;grid-template-columns:1fr;gap:10px;margin:12px 0 14px}
    .fund-choice{display:flex;align-items:flex-start;gap:12px;padding:16px;border:1px solid var(--line);border-radius:16px;background:var(--card2);cursor:pointer}
    .fund-choice.active{border-color:var(--orange);box-shadow:0 0 0 1px rgba(255,118,0,.18) inset}
    .fund-choice input{accent-color:var(--orange);margin-top:3px}
    .inline-summary{background:#151633;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px}
    .summary-line{display:flex;justify-content:space-between;gap:12px;margin-bottom:7px}
    .summary-line:last-child{margin-bottom:0}
    .side-actions{display:flex;flex-direction:column;gap:12px}
    .toggle{width:36px;height:20px;border-radius:999px;background:var(--orange);position:relative;display:inline-block;border:none;cursor:pointer}
    .toggle:after{content:"";position:absolute;top:2px;right:2px;width:16px;height:16px;border-radius:50%;background:#fff}
    .toggle.off{background:#5b5e84}
    .toggle.off:after{right:auto;left:2px}
    .agreement-pre{white-space:pre-wrap;font-size:11px;line-height:1.75;margin:0;color:#ececf3}
    .option-card{display:flex;align-items:flex-start;gap:16px;padding:26px 28px;border:1px solid var(--line);border-radius:18px;background:var(--card);cursor:pointer}
    .option-card.active{border-color:var(--orange);box-shadow:0 0 0 1px rgba(255,118,0,.2) inset}
    .option-card input{accent-color:var(--orange);width:22px;height:22px;margin-top:2px}
    .action-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px}
    .small-link{text-decoration:none;color:var(--orange)}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.64);display:flex;align-items:center;justify-content:center;padding:16px;z-index:2000}
    .otp-modal,.success-modal{width:100%;max-width:380px;background:#26262d;border-radius:16px;border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 60px rgba(0,0,0,.55);position:relative;padding:26px 24px 24px}
    .success-modal{max-width:430px;background:#242646}
    .modal-close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:#fff;font-size:24px;cursor:pointer}
    .otp-hero{width:98px;height:98px;margin:0 auto 14px;border-radius:50%;background:radial-gradient(circle at center,#66b1ff 0%,#2b7ce9 56%,#1c2f68 57%,#1c2f68 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 10px rgba(43,124,233,.12)}
    .otp-hero:before{content:'🛡️';font-size:34px}
    .modal-title{text-align:center;font-size:20px;font-weight:800;margin-bottom:4px}
    .modal-sub{text-align:center;font-size:13px;font-weight:600;margin-bottom:18px}
    .otp-boxes{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:18px}
    .otp-box{height:44px;border-radius:8px;border:1px solid #6f7584;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.02);font-size:22px;font-weight:700}
    .otp-hidden{position:absolute;opacity:0;pointer-events:none}
    .otp-sms-link{display:block;text-align:center;color:#ff9f1a;text-decoration:none;font-size:13px;font-weight:700;margin-top:14px}
    .success-icon{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(32,208,122,.14);color:var(--green);font-size:34px;margin:0 auto 14px}
    .success-body{text-align:center;color:var(--muted);line-height:1.65;margin-bottom:22px}
    @media(max-width:960px){.grid-3,.grid-2,.summary-grid,.layout-main,.method-grid,.action-row{grid-template-columns:1fr}.header{padding:0 12px;gap:12px}.page{padding:18px 14px 34px}.hotline{display:none}}
  </style>
</head>
<body>
<div id="app"></div>
<script>
const state = {
  page:'landing', signed:false, agreed:false, agreementFull:false, chartAmount:1000000000,
  faqOpen:{}, reportTab:'VAR', depositAmtVar:'', depositAmtFix:'', fixTerm:30, retainAmount:'0',
  historyTab:'var_tx', showAgreement:false, showSettings:false, viewLoan:null,
  signMethod:'digital', otpCode:'', modal:null, modalAction:null,
  varFundingSource:'bank', varSecuritiesAccount:'010101xxx1',
  fixFundingSource:'bank', fixSecuritiesAccount:'010101xxx1',
  autoDeposit:true,
  withdrawSchedule:{account:'071C000001 - BIDV', amount:'', frequency:'Hàng tuần', day:'Thứ hai'}
};
const AGREEMENT = `CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM\nĐộc lập – Tự do – Hạnh phúc\n───────────────\n\nTHỎA THUẬN CHO VAY\n(Bản nháp phục vụ demo)\nSố: [●]/[ddmmyy]/HĐCV-SB\n\nThỏa thuận cho vay này được giao kết bởi và giữa:\nI. BÊN VAY: CÔNG TY CỔ PHẦN STOCKBOOK\nII. BÊN CHO VAY: [HỌ VÀ TÊN]\n\nĐIỀU 1. GIẢI THÍCH TỪ NGỮ\nĐIỀU 2. MỤC ĐÍCH VÀ NỘI DUNG\n2.1. Thỏa thuận này là hợp đồng khung làm cơ sở xác lập các Giao dịch cho vay.\nĐIỀU 3. THANH TOÁN GỐC, LÃI\n3.2. Lãi vay = Số tiền cho vay × Số ngày × Lãi suất / 365\nĐIỀU 4–8. CÁC ĐIỀU KHOẢN KHÁC\n(Xem chi tiết trong hợp đồng đầy đủ)\n\nXÁC NHẬN NHẬN BIẾT RỦI RO\nBên cho vay xác nhận đã đọc, hiểu và chấp nhận các rủi ro liên quan.`;
const FAQS = [
  {q:'1. DPlus là gì?', a:'DPlus là giải pháp tối ưu tiền nhàn rỗi dành cho Khách hàng tổ chức, cho phép khách chủ động thực hiện hoàn toàn trên nền tảng số.'},
  {q:'2. Sau khi đăng ký DPlus, tôi có thể sử dụng những gói sản phẩm nào?', a:'Sau khi giao kết hợp đồng giao kết DPlus có hiệu lực, Quý khách có thể sử dụng 02 gói sản phẩm:<br>• DPlus VAR: phù hợp với nhu cầu tối ưu tiền nhàn rỗi ngắn ngày<br>• DPlus FIX: phù hợp với nhu cầu tối ưu tiền nhàn rỗi theo kỳ hạn cố định'},
  {q:'3. Tôi đăng ký DPlus như thế nào?', a:'Quý khách thực hiện đăng ký hợp đồng DPlus trên nền tảng điện tử. Sau khi hợp đồng có hiệu lực, toàn bộ thao tác sản phẩm được thực hiện trên dashboard DPlus.'},
  {q:'4. Sau khi đăng ký hợp đồng DPlus, tôi có phải đăng ký lại mỗi lần sử dụng sản phẩm không?', a:'Không. Sau khi hợp đồng giao kết DPlus có hiệu lực, Quý khách có thể thực hiện các giao dịch nộp tiền, rút tiền, tất toán, tái tục và thay đổi cài đặt trực tiếp trên dashboard.'},
  {q:'5. Tôi có thể tra cứu lịch sử giao dịch DPlus ở đâu?', a:'Quý khách có thể tra cứu tại mục DPlus > Tra cứu lịch sử'},
  {q:'6. Tiền lãi DPlus được tính như thế nào?', a:'Tiền lãi được tính theo từng gói sản phẩm và theo chính sách áp dụng của từng khoản tại thời điểm tham gia.<br>• Đối với DPlus VAR, lãi được tính theo thời gian nắm giữ thực tế.<br>• Đối với DPlus FIX, lãi được tính theo kỳ hạn cố định đã đăng ký.'},
  {q:'7. Khi tôi gửi yêu cầu rút tiền, bao lâu tiền được xử lý?', a:'Hệ thống sẽ hiển thị thời gian dự kiến hoàn tất trước khi Quý khách xác nhận giao dịch.'},
  {q:'8. Nếu tôi chuyển tiền sai nội dung/cú pháp thì phải làm gì?', a:'Quý khách vui lòng liên hệ ngân hàng chuyển tiền để tra soát, điều chỉnh nội dung chuyển tiền theo hướng dẫn hợp lệ, sau đó cung cấp chứng từ tra soát thành công để được hỗ trợ ghi nhận giao dịch theo quy trình của sản phẩm.'},
  {q:'9. Số dư giữ lại là gì?', a:'Số dư giữ lại là số tiền Quý khách muốn duy trì trên tài khoản chứng khoán. Phần số dư tiền vượt quá Số dư giữ lại sẽ được tự động nộp Dplus Var để bắt đầu sinh lời.'},
  {q:'10. DPlus có áp dụng thuế đối với tiền lãi không?', a:'Việc khấu trừ thuế đối với tiền lãi được thực hiện theo quy định pháp luật áp dụng tại từng thời kỳ.<br>- Khách hàng cá nhân áp dụng khấu trừ thuế thu nhập cá nhân 5% trên tiền lãi;<br>- Khách hàng tổ chức.'}
];
const PERIODS = [{label:'5 ngày',days:5},{label:'15 ngày',days:15},{label:'30 ngày',days:30},{label:'3 tháng',days:90},{label:'6 tháng',days:180},{label:'12 tháng',days:365}];
const QUICK_AMOUNTS = [50000000,100000000,200000000,500000000];
const WITHDRAW_AMOUNTS = [5000000,10000000,20000000,50000000];
const MOCK_VAR=[{id:'V001',amount:500000,rate:3.0,start:'06/04/2026',status:'Hiệu lực',estInterest:150,history:[{time:'06/04/2026 09:12:33',type:'DPlus VAR',amount:500000,remaining:500000,rate:3.0,interestPaid:''}]},{id:'V002',amount:100000,rate:3.0,start:'04/04/2026',status:'Hiệu lực',estInterest:60,history:[{time:'04/04/2026 14:20:00',type:'DPlus VAR',amount:100000,remaining:100000,rate:3.0,interestPaid:''}]}];
const MOCK_FIX=[{id:'F001',amount:600000000,rate:6.2,term:30,start:'04/04/2026',end:'04/05/2026',status:'Hiệu lực',estInterest:3057534,history:[{time:'04/04/2026 10:41:05',type:'DPlus FIX',amount:600000000,remaining:600000000,rate:6.2,interestPaid:''}]}];
const MOCK_HISTORY_VAR=[{date:'06/04/2026',type:'Nộp tiền',amount:500000,interest:0,status:'Thành công'},{date:'04/04/2026',type:'Nộp tiền',amount:100000,interest:0,status:'Thành công'}];
const MOCK_HISTORY_FIX=[{date:'06/04/2026',type:'Rút vốn trước hạn',amount:100000000,interest:164384,status:'Thành công'},{date:'04/04/2026',type:'Nộp tiền',amount:600000000,interest:0,status:'Thành công'}];
function fmt(n){return Number(n||0).toLocaleString('vi-VN')}
function getVarRate(days){ if(days<=10) return 3.0; if(days<=14) return 3.5; return 5.5; }
function getFixRate(days){ if(days<=30) return 6.2; if(days<=90) return 6.5; if(days<=180) return 7.5; return 8.0; }
function calcInterest(a,d,r){return Math.round(Number(a||0)*d*r/100/365)}
function addDaysFormatted(days){const d=new Date(2026,3,9); d.setDate(d.getDate()+Number(days||0)); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
function svgQRCode(amount){const seed=(Number(amount)||1)%9973;let cells='';for(let y=0;y<15;y++){for(let x=0;x<15;x++){const v=((x*7+y*13+seed)*31)%100;if(v<45||(x<3&&y<3)||(x>11&&y<3)||(x<3&&y>11)){cells+=`<rect x="${x*8}" y="${y*8}" width="8" height="8" fill="#fff"></rect>`;}}}return `<svg viewBox="0 0 120 120" style="width:120px;height:120px;background:#000;border-radius:6px;padding:4px">${cells}</svg>`}
function profitChart(amount){
  const fixedMax = 90000000; const gridStep = 10000000; const w=620,h=300,px=72,py=20,pb=36,iw=w-px-20,ih=h-py-pb;
  const varData=PERIODS.map(p=>calcInterest(amount,p.days,getVarRate(p.days)));
  const fixData=PERIODS.map(p=>calcInterest(amount,p.days,getFixRate(p.days)));
  const xFor=i=>px+(i/(PERIODS.length-1))*iw; const yFor=v=>py+ih-(Math.min(v,fixedMax)/fixedMax)*ih;
  const varPts=varData.map((v,i)=>({x:xFor(i),y:yFor(v),val:v})); const fixPts=fixData.map((v,i)=>({x:xFor(i),y:yFor(v),val:v}));
  const path = pts => pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(' ');
  let grid='';
  for(let val=0; val<=fixedMax; val+=gridStep){ const yy=py+ih-(val/fixedMax)*ih; grid += `<g><line x1="${px}" y1="${yy}" x2="${px+iw}" y2="${yy}" stroke="#3d3f67" stroke-width="0.6" stroke-dasharray="4,4"></line><text x="${px-8}" y="${yy+4}" fill="#a5a7c5" font-size="8" text-anchor="end">${val===0?'0':(val/1000000)+'tr'}</text></g>`; }
  const xLabels = PERIODS.map((p,i)=>`<text x="${xFor(i)}" y="${h-6}" fill="#a5a7c5" font-size="9" text-anchor="middle">${p.label}</text>`).join('');
  const varLabels = varPts.map(p=>`<g><circle cx="${p.x}" cy="${p.y}" r="3.8" fill="#17183a" stroke="#56a8ff" stroke-width="2"></circle><text x="${p.x-4}" y="${Math.min(h-18,p.y+16)}" fill="#56a8ff" font-size="7.5" text-anchor="end" font-weight="700">${p.val>=1e6?(p.val/1e6).toFixed(1)+'tr':fmt(p.val)}</text></g>`).join('');

amount?fmt(state.withdrawSchedule.amount)+' đ':'Chưa thiết lập'}</span></div><div class="muted" style="font-size:11px;margin-bottom:12px;line-height:1.6">Thiết lập lịch rút vốn định kỳ cho khoản DPlus FIX theo kế hoạch dòng tiền của Quý khách.</div><button class="btn secondary block" onclick="openWithdraw()">📅 Cài đặt rút vốn</button></div>`;
return `<div class="page"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h2>DPlus</h2><button class="btn ghost" onclick="setPage('landing')">ⓘ Tìm hiểu</button></div><div class="summary-grid"><div class="card summary-card"><div class="t">💰 Số dư DPlus VAR</div><div class="v blue">${fmt(varBal)} đ</div></div><div class="card summary-card"><div class="t">🔒 Số dư DPlus FIX</div><div class="v orange">${fmt(fixBal)} đ</div></div><div class="card summary-card"><div class="t">📅 Lãi đã thực hiện tháng</div><div class="v yellow">${fmt(total)} đ</div></div></div><div class="layout-main"><div><div class="card" style="margin-bottom:14px"><div style="padding:14px 20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center"><div style="font-size:14px;font-weight:700">Báo cáo DPlus</div><div class="tabs"><button class="${state.reportTab==='VAR'?'active':''}" onclick="setReportTab('VAR')">DPlus VAR</button><button class="${state.reportTab==='FIX'?'active':''}" onclick="setReportTab('FIX')">DPlus FIX</button></div></div><div style="overflow-x:auto"><table><thead><tr><th class="text-right">Số tiền</th><th class="text-right">Lãi suất</th><th class="text-right">Lãi dự kiến</th>${state.reportTab==='FIX'?'<th class="text-right">Ngày kết thúc</th>':''}<th class="text-center">Trạng thái</th>${state.reportTab==='FIX'?'<th class="text-center">Tái tục TĐ</th>':''}<th style="width:30px"></th></tr></thead><tbody>${tableData.map(c=>`<tr><td class="text-right">${fmt(c.amount)}</td><td class="text-right green">${c.rate}%</td><td class="text-right green">${fmt(c.estInterest)}</td>${state.reportTab==='FIX'?`<td class="text-right muted">${c.end}</td>`:''}<td class="text-center"><span class="pill">${c.status}</span></td>${state.reportTab==='FIX'?'<td class="text-center"><span class="toggle"></span></td>':''}<td class="text-center"><button style="background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer" onclick="viewLoan('${c.id}')">⋮</button></td></tr>`).join('')}</tbody></table></div></div><div class="card pad"><div style="font-size:14px;font-weight:700;margin-bottom:14px">Nộp tiền DPlus ${state.reportTab}</div>${state.reportTab==='VAR'?`<label class="label">Số tiền (VNĐ)</label><input class="input" placeholder="Nhập số tiền" value="${state.depositAmtVar}" oninput="updateDepositVar(this.value)">${quickAmountRow('VAR')}${varAmt>0?renderFundingPanel('VAR',varAmt):''}<button class="btn primary block" style="margin-top:14px" ${varAmt>0?'':'disabled'} onclick="submitDeposit('VAR')">Xác nhận</button>`:`<label class="label">Kỳ hạn</label><div class="term-row">${[30,60,90,180,365].map(d=>`<button class="term-btn ${state.fixTerm===d?'active':''}" onclick="setFixTerm(${d})">${d} ngày</button>`).join('')}</div><label class="label">Số tiền (VNĐ)</label><input class="input" placeholder="Nhập số tiền" value="${state.depositAmtFix}" oninput="updateDepositFix(this.value)">${quickAmountRow('FIX')}${fixAmt>0?renderFundingPanel('FIX',fixAmt,state.fixTerm,fixRate,fixInt,endDate):''}<button class="btn primary block" style="margin-top:14px" ${fixAmt>0?'':'disabled'} onclick="submitDeposit('FIX')">Xác nhận</button>`}</div></div><div class="side-actions">${side}<div class="card pad" style="font-size:11px"><div style="margin-bottom:8px"><a href="#" class="small-link" onclick="setPage('history');return false;">→ Lịch sử giao dịch</a></div><div><a href="#" class="small-link" onclick="openAgreement();return false;">→ Tra cứu hợp đồng thỏa thuận</a></div></div></div></div></div>`}
function agreementPage(){return `<div class="page" style="max-width:760px"><button class="btn ghost" style="margin-bottom:16px" onclick="closeAgreement()">← Quay lại</button><h2 style="margin-bottom:16px">Thỏa thuận cho vay đã giao kết</h2><div class="card pad" style="max-height:70vh;overflow-y:auto"><pre class="agreement-pre">${AGREEMENT}</pre></div></div>`}
function settingsPage(){return `<div class="page" style="max-width:620px"><button class="btn ghost" style="margin-bottom:16px" onclick="closeSettings()">← Quay lại</button><h2 style="margin-bottom:20px">Cài đặt tham số DPlus</h2><div class="card pad"><div style="font-size:16px;font-weight:700;margin-bottom:12px">Số dư giữ lại</div><label class="label">Nhập số tiền giữ lại trong tài khoản chứng khoán</label><div style="display:flex;align-items:center;gap:8px;margin-bottom:20px"><input class="input" value="${state.retainAmount}" oninput="updateRetain(this.value)"><span class="muted">đ</span></div><div class="inline-summary" style="margin-bottom:20px"><div style="font-size:12px;font-weight:700;margin-bottom:10px">Cách thức hoạt động:</div><div class="helper">• Nếu số dư cuối ngày > số dư giữ lại: phần chênh lệch thỏa mãn điều kiện sẽ được tự động nộp vào DPlus.<br>• Nếu số dư cuối ngày ≤ số dư giữ lại: không thực hiện tự động nộp tiền.</div></div><div class="note-box" style="margin-bottom:20px"><div class="section-title yellow">⏰ Lưu ý về thời gian áp dụng</div><div class="helper">• Trước 16h: áp dụng ngay trong ngày<br>• Sau 16h: áp dụng từ ngày hôm sau</div></div><button class="btn primary block" onclick="closeSettings()">Lưu cài đặt</button></div></div>`}
function loanDetailPage(){const isVar=MOCK_VAR.find(v=>v.id===state.viewLoan); const loan=isVar||MOCK_FIX.find(f=>f.id===state.viewLoan); const type=isVar?'VAR':'FIX'; const rows=[['Sản phẩm',type==='VAR'?'DPlus VAR':'DPlus FIX'],['Số tiền',fmt(loan.amount)+' đ'],['Lãi suất',loan.rate+'%/năm'],...(loan.term?[['Kỳ hạn',loan.term+' ngày']]:[]),['Ngày cho vay',loan.start],...(loan.end?[['Ngày kết thúc',loan.end]]:[]),['Trạng thái',loan.status]]; return `<div class="page" style="max-width:860px"><button class="btn ghost" style="margin-bottom:16px" onclick="closeLoan()">← Quay lại</button><h2 style="margin-bottom:16px">Chi tiết khoản vay</h2><div class="card pad" style="margin-bottom:16px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${rows.map(r=>`<div class="summary-line"><span class="muted">${r[0]}</span><span>${r[1]}</span></div>`).join('')}</div></div><div class="card" style="overflow:hidden"><div style="padding:12px 20px;border-bottom:1px solid var(--line);font-weight:700">Lịch sử khoản vay</div><table><thead><tr><th>Thời gian</th><th>Loại giao dịch</th><th class="text-right">Số tiền</th><th class="text-right">Tiền gốc còn lại</th><th class="text-right">Lãi suất</th><th class="text-right">Lãi đã nhận</th></tr></thead><tbody>${loan.history.map(h=>`<tr><td style="font-size:10px">${h.time}</td><td style="font-weight:700;color:${h.type.includes('Rút')?'var(--danger)':'var(--green)'}">${h.type}</td><td class="text-right">${fmt(h.amount)}</td><td class="text-right">${fmt(h.remaining)}</td><td class="text-right yellow">${h.rate}%</td><td class="text-right green">${h.interestPaid!==''?fmt(h.interestPaid):'–'}</td></tr>`).join('')}</tbody></table></div></div>`}
function historyPage(){const tab=state.historyTab; const tabs=[{key:'var_tx',label:'DPlus VAR'},{key:'fix_tx',label:'DPlus FIX'},{key:'interest',label:'Lãi đã thực hiện'}]; const data=tab==='var_tx'?MOCK_HISTORY_VAR:tab==='fix_tx'?MOCK_HISTORY_FIX:MOCK_HISTORY_FIX.filter(h=>h.interest>0); const showFixNote = tab==='fix_tx' || tab==='interest'; return `<div class="page" style="max-width:920px"><h2 style="margin-bottom:12px">Lịch sử</h2><div style="display:flex;gap:0;margin-bottom:16px;border-bottom:1px solid var(--line);flex-wrap:wrap">${tabs.map(t=>`<button class="btn secondary" style="border:none;border-bottom:${tab===t.key?'2px solid var(--orange)':'2px solid transparent'};border-radius:0;color:${tab===t.key?'var(--orange)':'#a5a7c5'};padding:8px 16px" onclick="setHistoryTab('${t.key}')">${t.label}</button>`).join('')}</div>${showFixNote?`<div class="note-box" style="margin-bottom:16px"><div class="section-title yellow">Lưu ý</div><div class="helper">(i) Dữ liệu tra cứu được cập nhật đến ngày giao dịch liền trước. Tiền lãi Dplus Fix được ghi nhận vào ngày kết thúc/rút trước hạn, và sẽ được chuyển thành Dplus Var.</div></div>`:''}<div class="card" style="overflow:hidden"><table><thead><tr><th>Ngày</th><th>Loại giao dịch</th><th class="text-right">Số tiền</th><th class="text-right">${tab==='interest'?'Lãi đã nhận':'Lãi thực hiện'}</th><th class="text-right">Trạng thái</th></tr></thead><tbody>${data.length===0?`<tr><td colspan="5" class="text-center muted" style="padding:32px">Không có dữ liệu</td></tr>`:data.map(h=>`<tr><td>${h.date}</td><td style="font-weight:700;color:${h.type.includes('Rút')?'var(--danger)':h.type==='Nhận lãi'?'var(--yellow)':'var(--green)'}">${h.type}</td><td class="text-right">${h.amount?fmt(h.amount):'–'}</td><td class="text-right green">${h.interest?fmt(h.interest):'–'}</td><td class="text-right"><span class="pill">${h.status}</span></td></tr>`).join('')}</tbody></table></div></div>`}
function withdrawModal(){if(state.modal!=='withdraw_setup') return ''; return `<div class="modal-overlay" onclick="closeModal(event)"><div class="success-modal" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">×</button><div class="modal-title" style="margin-bottom:14px">Thiết lập rút vốn định kỳ</div><div style="margin-bottom:14px"><label class="label" style="font-size:12px">Tài khoản nhận tiền*</label><select class="select" onchange="setWithdrawAccount(this.value)"><option value="071C000001 - BIDV" ${state.withdrawSchedule.account==='071C000001 - BIDV'?'selected':''}>071C000001 - BIDV</option><option value="010101xxx1 - TK thường" ${state.withdrawSchedule.account==='010101xxx1 - TK thường'?'selected':''}>TK thường 010101xxx1</option><option value="010101xxx2 - TK Margin" ${state.withdrawSchedule.account==='010101xxx2 - TK Margin'?'selected':''}>TK Margin 010101xxx2</option></select></div><div style="margin-bottom:14px"><label class="label" style="font-size:12px">Số tiền*</label><input class="input" placeholder="Nhập số tiền" value="${state.withdrawSchedule.amount}" oninput="setWithdrawAmount(this.value)">${quickAmountRow('WITHDRAW')}</div><div style="margin-bottom:14px"><label class="label" style="font-size:12px">Định kỳ*</label><select class="select" onchange="setWithdrawFrequency(this.value)"><option ${state.withdrawSchedule.frequency==='Hàng tuần'?'selected':''}>Hàng tuần</option><option ${state.withdrawSchedule.frequency==='Hàng ngày'?'selected':''}>Hàng ngày</option><option ${state.withdrawSchedule.frequency==='Hàng tháng'?'selected':''}>Hàng tháng</option></select></div><div style="margin-bottom:14px"><label class="label" style="font-size:12px">Vào ngày*</label><select class="select" onchange="setWithdrawDay(this.value)"><option ${state.withdrawSchedule.day==='Thứ hai'?'selected':''}>Thứ hai</option><option ${state.withdrawSchedule.day==='Thứ ba'?'selected':''}>Thứ ba</option><option ${state.withdrawSchedule.day==='Thứ tư'?'selected':''}>Thứ tư</option><option ${state.withdrawSchedule.day==='Thứ năm'?'selected':''}>Thứ năm</option><option ${state.withdrawSchedule.day==='Thứ sáu'?'selected':''}>Thứ sáu</option></select></div><div class="note-box" style="margin-top:0;margin-bottom:18px"><div class="section-title yellow">Lưu ý</div><div class="helper">(i) Nguyên tắc rút vốn: ưu tiên các khoản vay có ngày cho vay gần nhất.</div></div><div class="action-row"><button class="btn primary" onclick="saveWithdrawSetup()">Thiết lập</button><button class="btn secondary" onclick="closeModal()">Quay lại</button></div></div></div>`}
function otpModal(){if(state.modal!=='otp') return ''; const digits=(state.otpCode||'').split(''); const valid=/^\d{6}$/.test(state.otpCode||''); return `<div class="modal-overlay" onclick="closeModal(event)"><div class="otp-modal" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">×</button><div class="otp-hero"></div><div class="modal-title">Xác thực OTP giao dịch</div><div class="modal-sub">Quý khách vui lòng nhập SMART OTP</div><div class="otp-boxes" onclick="focusOtpInput()">${Array.from({length:6}).map((_,i)=>`<div class="otp-box">${digits[i]||'-'}</div>`).join('')}</div><input id="otp-hidden-input" class="otp-hidden" inputmode="numeric" maxlength="6" value="${state.otpCode||''}" oninput="updateOtp(this.value)"><button class="btn primary block" ${valid?'':'disabled'} onclick="confirmOtp()">Xác nhận</button><a href="#" class="otp-sms-link" onclick="return false;">Nhận mã OTP qua SMS</a></div></div>`}
function successModal(){if(state.modal!=='success') return ''; const isDeposit = state.modalAction==='deposit_VAR' || state.modalAction==='deposit_FIX'; const title = isDeposit ? 'Yêu cầu nộp tiền thành công' : 'Giao kết thành công'; const body = isDeposit ? `Yêu cầu nộp tiền ${state.modalAction==='deposit_VAR'?'DPlus VAR':'DPlus FIX'} của Quý khách đã được ghi nhận thành công.` : 'Hợp đồng DPlus của Quý khách đã được giao kết thành công.'; return `<div class="modal-overlay" onclick="closeModal(event)"><div class="success-modal" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">×</button><div class="success-icon">✓</div><div class="modal-title">${title}</div><div class="success-body">${body}</div><div class="action-row"><button class="btn primary" onclick="successPrimary()">Nộp tiền</button><button class="btn secondary" onclick="successSecondary()">Quay lại</button></div></div></div>`}
function appContent(){switch(state.page){case'register':return registerPage(); case'sign_method':return signMethodPage(); case'dashboard':return dashboardPage(); case'history':return historyPage(); default:return landingPage();}}
function render(){document.getElementById('app').innerHTML = header()+appContent()+withdrawModal()+otpModal()+successModal(); if(state.modal==='otp'){setTimeout(()=>{const el=document.getElementById('otp-hidden-input'); if(el) el.focus();},0);} }
function setPage(page){state.page=page; render();}
function goHome(){state.page=state.signed?'dashboard':'landing'; render();}
function toggleFaq(i){state.faqOpen[i]=!state.faqOpen[i]; render();}
function updateChartAmount(v){state.chartAmount=Number(v); render();}
function toggleAgreementFull(){state.agreementFull=!state.agreementFull; render();}
function toggleAgree(v){state.agreed=v; render();}
function openSignMethod(){if(!state.agreed) return; state.page='sign_method'; render();}
function setSignMethod(v){state.signMethod=v; render();}
function confirmSignMethod(){ if(state.signMethod==='otp'){ state.otpCode=''; state.modalAction='sign'; state.modal='otp'; } else { state.signed=true; state.modalAction='sign'; state.modal='success'; } render(); }
function closeModal(e){ if(e && e.target && !String(e.target.className).includes('modal-overlay')) return; state.modal=null; state.otpCode=''; render(); }
function focusOtpInput(){const el=document.getElementById('otp-hidden-input'); if(el) el.focus();}
function updateOtp(v){ state.otpCode=String(v||'').replace(/\D/g,'').slice(0,6); const el=document.getElementById('otp-hidden-input'); if(el && el.value!==state.otpCode) el.value=state.otpCode; render(); }
function confirmOtp(){ if(!/^\d{6}$/.test(state.otpCode||'')) return; if(state.modalAction==='sign'){ state.signed=true; } state.modal='success'; state.otpCode=''; render(); }
function successPrimary(){ state.modal=null; state.page='dashboard'; render(); }
function successSecondary(){ state.modal=null; state.page='dashboard'; render(); }
function setReportTab(t){state.reportTab=t; render();}
function updateDepositVar(v){state.depositAmtVar=String(v).replace(/\D/g,''); render();}
function updateDepositFix(v){state.depositAmtFix=String(v).replace(/\D/g,''); render();}
function setFixTerm(d){state.fixTerm=Number(d); render();}
function setQuickAmount(type,amt){ if(type==='VAR') state.depositAmtVar=String(amt); else if(type==='FIX') state.depositAmtFix=String(amt); else if(type==='WITHDRAW') state.withdrawSchedule.amount=String(amt); render(); }
function setVarFundingSource(v){state.varFundingSource=v; render();}
function setFixFundingSource(v){state.fixFundingSource=v; render();}
function setVarSecuritiesAccount(v){state.varSecuritiesAccount=v; render();}
function setFixSecuritiesAccount(v){state.fixSecuritiesAccount=v; render();}
function submitDeposit(type){ const source = type==='VAR'?state.varFundingSource:state.fixFundingSource; if(type==='VAR' && !Number(state.depositAmtVar||0)) return; if(type==='FIX' && !Number(state.depositAmtFix||0)) return; state.modalAction='deposit_'+type; if(source==='bank'){ state.modal='success'; } else { state.otpCode=''; state.modal='otp'; } render(); }
function viewLoan(id){state.viewLoan=id; render();}
function closeLoan(){state.viewLoan=null; render();}
function openAgreement(){state.showAgreement=true; render();}
function closeAgreement(){state.showAgreement=false; render();}
function openSettings(){state.showSettings=true; render();}
function closeSettings(){state.showSettings=false; render();}
function updateRetain(v){state.retainAmount=String(v).replace(/\D/g,''); render();}
function openWithdraw(){state.modal='withdraw_setup'; render();}
function setHistoryTab(t){state.historyTab=t; render();}
function toggleAutoDeposit(){state.autoDeposit=!state.autoDeposit; render();}
function setWithdrawAccount(v){state.withdrawSchedule.account=v; render();}
function setWithdrawAmount(v){state.withdrawSchedule.amount=String(v).replace(/\D/g,''); render();}
function setWithdrawFrequency(v){state.withdrawSchedule.frequency=v; render();}
function setWithdrawDay(v){state.withdrawSchedule.day=v; render();}
function saveWithdrawSetup(){state.modal=null; render();}
render();
</script>
</body>
</html>
